services:
  - type: web
    name: saniya-humanize
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CORS_ORIGIN
        value: "*"
      - key: LOG_LEVEL
        value: info
      # Add secrets via Render dashboard
      - key: MONGODB_URI
        sync: false
